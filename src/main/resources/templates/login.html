<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Connect</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">

    <div class="logo">
        <i class="bi bi-recycle"></i>
    </div>

    <div class="brand">CONNECT</div>
    <div class="subtitle">Sistema de Incentivo à Reciclagem</div>

    <div class="login-card">

        <div class="login-title">Bem-vindo de volta</div>
        <div class="login-desc">Entre na sua conta para continuar</div>

        <!-- RF03 Regra 3: mensagem de erro -->
        <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" style="border-radius:8px;font-size:.9rem">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${erro}"></span>
        </div>

        <!-- Mensagem de logout bem-sucedido -->
        <div th:if="${mensagem}" class="alert alert-success d-flex align-items-center gap-2 mb-3" style="border-radius:8px;font-size:.9rem">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${mensagem}"></span>
        </div>

        <!-- RF03: formulário de login -->
        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <!-- Mantém o e-mail preenchido após erro -->
                <input type="email" name="email" class="form-control"
                       th:classappend="${erro != null} ? 'is-invalid'"
                       required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control"
                       th:classappend="${erro != null} ? 'is-invalid'"
                       required>
            </div>

            <div class="options">
                <div></div>
                <a href="#">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn-login">
                Entrar
            </button>

        </form>

        <div class="signup">
            Não tem conta?
            <a href="/registro">Cadastre-se</a>
        </div>

    </div>

    <div class="version">Versão 1.0.0</div>

</div>

</body>
</html>
