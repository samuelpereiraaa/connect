<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe do Relatório - Connect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --cg: #00B26D; --cg-h: #00965C; --cg-l: #E6F7F0;
            --cd: #111827; --cm: #6B7280;
            --admin: #7C3AED; --admin-l: #EDE9FE;
        }
        body { font-family: 'Inter', sans-serif; background: #F3F4F6; color: var(--cd); margin: 0; }

        .navbar { background: #1F2937; padding: 1rem 0; }
        .navbar-brand { font-weight: 800; font-size: 1.25rem; color: #fff !important; }
        .navbar-brand span { color: var(--cg); }
        .nav-btn { font-size: .85rem; font-weight: 600; border-radius: 8px;
                   padding: .4rem 1rem; border: none; cursor: pointer; text-decoration: none;
                   display: inline-flex; align-items: center; gap: .4rem; }
        .nav-btn-ghost { background: rgba(255,255,255,.08); color: #D1D5DB; }
        .nav-btn-ghost:hover { background: rgba(255,255,255,.16); color: #fff; }

        .page-header {
            background: linear-gradient(135deg, #1F2937 0%, #111827 100%);
            color: #fff; padding: 2rem 0 1.75rem;
        }
        .page-header h1 { font-weight: 800; font-size: 1.8rem; margin: 0; }
        .page-header p  { color: #9CA3AF; font-size: .9rem; margin: .3rem 0 0; }

        .detail-card {
            background: #fff; border: 1px solid #E5E7EB; border-radius: 16px;
            padding: 2rem; max-width: 680px; margin: 2rem auto;
        }
        .detail-row {
            display: flex; justify-content: space-between;
            padding: .75rem 0; border-bottom: 1px solid #F3F4F6;
            font-size: .9rem;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--cm); font-weight: 600; font-size: .8rem; }
        .detail-value { font-weight: 500; }

        .stat-box {
            background: var(--cg-l); border-radius: 12px; padding: 1.25rem;
            text-align: center; margin-bottom: 1.5rem;
        }
        .stat-box .stat-num {
            font-size: 2.5rem; font-weight: 800; color: var(--cg-h); line-height: 1;
        }
        .stat-box .stat-label { font-size: .8rem; color: var(--cm); margin-top: .3rem; }

        .badge-tipo {
            display: inline-block; border-radius: 6px;
            padding: .3rem .75rem; font-size: .8rem; font-weight: 700;
        }
        .badge-reciclagem { background: var(--cg-l); color: var(--cg-h); }
        .badge-pontuacao  { background: #FEF3C7; color: #92400E; }
        .badge-usuarios   { background: var(--admin-l); color: var(--admin); }
        .badge-outros     { background: #F3F4F6; color: #374151; }

        .btn-voltar {
            background: transparent; color: var(--cm); border: 1.5px solid #D1D5DB;
            border-radius: 10px; font-weight: 600; font-size: .875rem;
            padding: .55rem 1.2rem; text-decoration: none;
            display: inline-flex; align-items: center; gap: .4rem;
        }
        .btn-voltar:hover { border-color: #9CA3AF; color: var(--cd); }
        .btn-excluir {
            background: #FEE2E2; color: #DC2626; border: none;
            border-radius: 10px; font-weight: 600; font-size: .875rem;
            padding: .55rem 1.2rem;
            display: inline-flex; align-items: center; gap: .4rem;
        }
        .btn-excluir:hover { background: #FECACA; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand" href="/admin/home">Connect<span>.</span></a>
        <a href="/admin/relatorios" class="nav-btn nav-btn-ghost">
            <i class="bi bi-arrow-left"></i> Relatórios
        </a>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <h1><i class="bi bi-file-earmark-text me-2"></i>
            Relatório #<span th:text="${relatorio.idRelatorio}"></span>
        </h1>
        <p>Detalhes do relatório gerado</p>
    </div>
</div>

<div class="container">
    <div class="detail-card">

        <!-- Destaque do total reciclado -->
        <div class="stat-box">
            <div class="stat-num"
                 th:text="${#numbers.formatDecimal(relatorio.totalReciclado, 1, 2)}">
            </div>
            <div class="stat-label">kg totais reciclados no período</div>
        </div>

        <!-- Dados do relatório -->
        <div class="detail-row">
            <span class="detail-label">Tipo</span>
            <span class="detail-value">
                <span class="badge-tipo"
                      th:classappend="${relatorio.tipo == 'RECICLAGEM' ? 'badge-reciclagem' :
                                       relatorio.tipo == 'PONTUACAO'  ? 'badge-pontuacao'  :
                                       relatorio.tipo == 'USUARIOS'   ? 'badge-usuarios'   :
                                       'badge-outros'}"
                      th:text="${relatorio.tipo}">
                </span>
            </span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Período</span>
            <span class="detail-value">
                <span th:text="${#temporals.format(relatorio.dataInicio, 'dd/MM/yyyy')}"></span>
                &rarr;
                <span th:text="${#temporals.format(relatorio.dataFim, 'dd/MM/yyyy')}"></span>
            </span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Gerado por (Admin)</span>
            <span class="detail-value" th:text="${relatorio.administrador.usuario.nome}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Nível de Acesso do Admin</span>
            <span class="detail-value" th:text="${relatorio.administrador.nivelAcesso}"></span>
        </div>

        <!-- Ações -->
        <div class="d-flex gap-2 mt-4">
            <a href="/admin/relatorios" class="btn-voltar">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
            <!-- RF11-3: excluir somente para nível >= 3 -->
            <form th:if="${admin.nivelAcesso >= 3}"
                  th:action="@{/admin/relatorios/{id}/excluir(id=${relatorio.idRelatorio})}"
                  method="post"
                  onsubmit="return confirm('Confirma exclusão do Relatório #' + /*[[${relatorio.idRelatorio}]]*/ '?')">
                <button type="submit" class="btn-excluir">
                    <i class="bi bi-trash"></i> Excluir Relatório
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
