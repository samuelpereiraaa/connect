<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto de Coleta - Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; --cg-h: #00965C; --cg-l: #E6F7F0; --cd: #111827; --cm: #6B7280; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: var(--cd); }
        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--cg) !important; font-size: 1.3rem; }
        .btn-connect { background: var(--cg); color: #fff; font-weight: 600; border: none; border-radius: 8px; padding: .55rem 1.5rem; }
        .btn-connect:hover { background: var(--cg-h); color: #fff; }
        .card { border: 1px solid #E5E7EB; border-radius: 12px; }
        .card-header { background: #fff; border-bottom: 1px solid #E5E7EB; border-radius: 12px 12px 0 0 !important; padding: 1.25rem 1.5rem; }
        .form-label { font-size: .87rem; font-weight: 600; }
        .form-control, .form-select { border-color: #D1D5DB; border-radius: 8px; font-size: .92rem; }
        .form-control:focus, .form-select:focus { border-color: var(--cg); box-shadow: 0 0 0 .2rem rgba(0,178,109,.15); }
        .section-label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--cm); margin-bottom: .75rem; }
        .form-text { font-size: .8rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect Admin</span>
        <a href="/admin/pontos" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>
</nav>

<div class="container py-4" style="max-width: 720px">

    <div class="mb-4">
        <h4 class="fw-bold mb-0"
            th:text="${ponto.idPonto != null} ? 'Editar Ponto de Coleta' : 'Novo Ponto de Coleta'"></h4>
        <p class="text-muted mb-0" style="font-size:.9rem">RF04 — Preencha os dados do ponto e o endereço</p>
    </div>

    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
    </div>

    <form th:action="${ponto.idPonto != null} ? @{/admin/pontos/editar/{id}(id=${ponto.idPonto})} : @{/admin/pontos/novo}"
          method="post">

        <!-- Dados do Ponto -->
        <div class="card mb-3">
            <div class="card-header"><span class="fw-semibold"><i class="bi bi-geo-alt me-2"></i>Dados do Ponto</span></div>
            <div class="card-body p-4">

                <p class="section-label">Informações gerais</p>

                <div class="mb-3">
                    <label class="form-label">Nome do ponto <span class="text-danger">*</span></label>
                    <input type="text" name="nome" class="form-control"
                           th:value="${ponto.nome}" placeholder="Ex: Ecoponto Centro" required>
                </div>

                <div class="row g-3">
                
                    <div class="col-md-6">
                        <label class="form-label">Horário de funcionamento</label>
                        <input type="text" name="horarioFuncionamento" class="form-control"
                               th:value="${ponto.horarioFuncionamento}"
                               placeholder="Ex: Seg-Sex 08h às 17h">
                    </div>
                </div>

                <!-- Status só aparece na edição -->
                <div class="mt-3" th:if="${ponto.idPonto != null}">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option th:each="s : ${statusOpcoes}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"
                                th:selected="${ponto.status == s}"></option>
                    </select>
                </div>

            </div>
        </div>

        <!-- Endereço obrigatório - RF04 Regra 1 -->
        <div class="card mb-4">
            <div class="card-header">
                <span class="fw-semibold"><i class="bi bi-map me-2"></i>Endereço
                    <span class="text-danger ms-1" style="font-size:.82rem">* obrigatório</span>
                </span>
            </div>
            <div class="card-body p-4">

                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">CEP <span class="text-danger">*</span></label>
                        <input type="text" name="cep" id="cep" class="form-control"
                               th:value="${endereco.cep}" placeholder="00000000"
                               maxlength="8" required>
                    </div>
                    <div class="col-md-8">
                        <label class="form-label">Logradouro <span class="text-danger">*</span></label>
                        <input type="text" name="logradouro" id="logradouro" class="form-control"
                               th:value="${endereco.logradouro}" placeholder="Rua, Avenida..." required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Número <span class="text-danger">*</span></label>
                        <input type="text" name="numero" class="form-control"
                               th:value="${endereco.numero}" placeholder="Ex: 123" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Bairro <span class="text-danger">*</span></label>
                        <input type="text" name="bairro" id="bairro" class="form-control"
                               th:value="${endereco.bairro}" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Complemento</label>
                        <input type="text" name="complemento" class="form-control"
                               th:value="${endereco.complemento}" placeholder="Apto, Sala...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Município <span class="text-danger">*</span></label>
                        <input type="text" name="municipio" id="municipio" class="form-control"
                               th:value="${endereco.municipio}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Estado <span class="text-danger">*</span></label>
                        <select name="estado" id="estado" class="form-select" required>
                            <option value="">Selecione</option>
                            <option th:each="uf : ${ {'AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'} }"
                                    th:value="${uf}" th:text="${uf}"
                                    th:selected="${endereco.estado == uf}"></option>
                        </select>
                    </div>
                </div>

            </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
            <a href="/admin/pontos" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-connect">
                <i class="bi bi-check-lg me-1"></i>
                <span th:text="${ponto.idPonto != null} ? 'Salvar alterações' : 'Cadastrar ponto'"></span>
            </button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Busca automática de endereço pelo CEP via ViaCEP
    document.getElementById('cep').addEventListener('blur', function () {
        const cep = this.value.replace(/\D/g, '');
        if (cep.length !== 8) return;

        fetch(`https://viacep.com.br/ws/${cep}/json/`)
            .then(r => r.json())
            .then(d => {
                if (d.erro) return;
                document.getElementById('logradouro').value = d.logradouro || '';
                document.getElementById('bairro').value     = d.bairro    || '';
                document.getElementById('municipio').value  = d.localidade || '';
                document.getElementById('estado').value     = d.uf         || '';
            })
            .catch(() => {});
    });
</script>
</body>
</html>
