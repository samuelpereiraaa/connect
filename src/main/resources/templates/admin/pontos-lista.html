<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pontos de Coleta - Connect</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect Admin</span>
        <div class="d-flex gap-2">
            <a href="/admin/usuarios" class="btn btn-sm btn-outline-secondary">Usuários</a>
            <a href="/logout" class="btn btn-sm btn-outline-secondary"><i class="bi bi-box-arrow-right me-1"></i>Sair</a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">Pontos de Coleta</h4>
            <p class="text-muted mb-0" style="font-size:.9rem">RF04 — Cadastro, alteração e consulta de pontos</p>
        </div>
        <a href="/admin/pontos/novo" class="btn btn-connect">
            <i class="bi bi-plus-lg me-1"></i>Novo Ponto
        </a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
    </div>

    <!-- Filtros -->
    <div class="filter-card">
        <form method="get" action="/admin/pontos">
            <div class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label class="form-label fw-semibold" style="font-size:.85rem">Nome do ponto</label>
                    <input type="text" name="nome" class="form-control" placeholder="Buscar por nome" th:value="${filtrNome}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold" style="font-size:.85rem">Status</label>
                    <select name="status" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="s : ${statusOpcoes}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"
                                th:selected="${filtrStatus == s.name()}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-connect w-100"><i class="bi bi-search me-1"></i>Filtrar</button>
                    <a href="/admin/pontos" class="btn btn-outline-secondary"><i class="bi bi-x-lg"></i></a>
                </div>
            </div>
        </form>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Pontos cadastrados
                <span class="badge bg-light text-dark ms-2" th:text="${#lists.size(pontos)}"></span>
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nome</th>
                            <th>Tipo de Material</th>
                            <th>Horário</th>
                            <th>Município / Estado</th>
                            <th>Status</th>
                            <th class="pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(pontos)}">
                            <td colspan="7" class="text-center text-muted py-4">Nenhum ponto de coleta cadastrado.</td>
                        </tr>
                        <tr th:each="p : ${pontos}">
                            <td class="ps-4 text-muted" th:text="${p.idPonto}"></td>
                            <td class="fw-500" th:text="${p.nome}"></td>
							<td>
							    <span th:if="${p.materiais != null and not #lists.isEmpty(p.materiais)}">
							        <span th:each="m,i : ${p.materiais}"
							              class="badge badge-material rounded-pill me-1"
							              th:text="${m.nome}"></span>
							    </span>
							    <span th:if="${p.materiais == null or #lists.isEmpty(p.materiais)}"
							          class="text-muted">—</span>
							</td>
                            <td th:text="${p.horarioFuncionamento != null ? p.horarioFuncionamento : '—'}"></td>
                            <td>
                                <span th:if="${p.endereco != null}"
                                      th:text="${p.endereco.municipio + ' / ' + p.endereco.estado}"></span>
                                <span th:if="${p.endereco == null}" class="text-muted">Sem endereço</span>
                            </td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${p.status != null and p.status.name() == 'ATIVO'} ? 'badge-ativo' : 'badge-inativo'"
                                      th:text="${p.status != null ? p.status.name() : '—'}"></span>
                            </td>
                            <td class="pe-4">
                                <div class="d-flex gap-1">
                                    <a th:href="@{/admin/pontos/editar/{id}(id=${p.idPonto})}"
                                       class="btn btn-outline-secondary action-btn" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:if="${p.status != null and p.status.name() != 'INATIVO'}"
                                          th:action="@{/admin/pontos/status/{id}(id=${p.idPonto})}" method="post">
                                        <input type="hidden" name="novoStatus" value="INATIVO">
                                        <button class="btn action-btn" style="background:#F3F4F6;color:#374151" title="Inativar">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </form>
                                    <form th:if="${p.status != null and p.status.name() == 'INATIVO'}"
                                          th:action="@{/admin/pontos/status/{id}(id=${p.idPonto})}" method="post">
                                        <input type="hidden" name="novoStatus" value="ATIVO">
                                        <button class="btn action-btn" style="background:#D1FAE5;color:#065F46" title="Ativar">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
