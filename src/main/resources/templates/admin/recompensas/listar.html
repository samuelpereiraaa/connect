<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recompensas - Connect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; --cg-h: #00965C; --cg-l: #E6F7F0; --cd: #111827; --cm: #6B7280; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: var(--cd); }
        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--cg) !important; font-size: 1.3rem; }
        .btn-connect { background: var(--cg); color: #fff; font-weight: 600; border: none; border-radius: 8px; padding: .55rem 1.5rem; }
        .btn-connect:hover { background: var(--cg-h); color: #fff; }
        .card { border: 1px solid #E5E7EB; border-radius: 12px; }
        .card-header { background: #fff; border-bottom: 1px solid #E5E7EB; border-radius: 12px 12px 0 0 !important; padding: 1.1rem 1.5rem; }
        .filter-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
        .form-control, .form-select { border-color: #D1D5DB; border-radius: 8px; font-size: .92rem; }
        .form-control:focus, .form-select:focus { border-color: var(--cg); box-shadow: 0 0 0 .2rem rgba(0,178,109,.15); }
        .form-label { font-size: .85rem; font-weight: 600; }
        .table thead th { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--cm); border-bottom: 1px solid #E5E7EB; background: #F9FAFB; }
        .table tbody td { vertical-align: middle; font-size: .9rem; }
        .action-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 8px; padding: 0; font-size: .85rem; }
        .badge-ativo   { background: #D1FAE5; color: #065F46; font-weight: 600; font-size: .78rem; }
        .badge-inativo { background: #F3F4F6; color: #374151; font-weight: 600; font-size: .78rem; }
        .badge-esgotado { background: #FEE2E2; color: #991B1B; font-weight: 600; font-size: .78rem; }
        .pontos-pill { background: var(--cg-l); color: var(--cg); font-weight: 700; border-radius: 999px; padding: .2rem .7rem; font-size: .82rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect Admin</span>
        <div class="d-flex gap-2">
            <a href="/admin/usuarios"  class="btn btn-sm btn-outline-secondary">Usuários</a>
            <a href="/admin/pontos"    class="btn btn-sm btn-outline-secondary">Pontos</a>
            <a href="/admin/resgates"  class="btn btn-sm btn-outline-success">
                <i class="bi bi-bag-check me-1"></i>Resgates
            </a>
            <a href="/logout"          class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right me-1"></i>Sair
            </a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- Cabeçalho -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">Recompensas</h4>
            <p class="text-muted mb-0" style="font-size:.9rem">RF09 — Cadastro, alteração e consulta de recompensas</p>
        </div>
        <a href="/admin/recompensas/nova" class="btn btn-connect">
            <i class="bi bi-plus-lg me-1"></i>Nova Recompensa
        </a>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i><span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
    </div>

    <!-- Filtros -->
    <div class="filter-card">
        <form method="get" action="/admin/recompensas">
            <div class="row g-2 align-items-end">
                <div class="col-md-5">
                    <label class="form-label">Nome da recompensa</label>
                    <input type="text" name="nome" class="form-control"
                           placeholder="Buscar por nome" th:value="${filtrNome}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="s : ${statusOpcoes}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"
                                th:selected="${filtrStatus == s.name()}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-connect w-100">
                        <i class="bi bi-search me-1"></i>Filtrar
                    </button>
                    <a href="/admin/recompensas" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </div>
        </form>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">
                Recompensas cadastradas
                <span class="badge bg-light text-dark ms-2" th:text="${#lists.size(recompensas)}"></span>
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Pontos</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th class="pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(recompensas)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                Nenhuma recompensa cadastrada.
                            </td>
                        </tr>
                        <tr th:each="r : ${recompensas}">
                            <td class="ps-4 text-muted" th:text="${r.idRecompensa}"></td>
                            <td class="fw-semibold" th:text="${r.nome}"></td>
                            <td class="text-muted" th:text="${r.tipo != null ? r.tipo : '—'}"></td>
                            <td>
                                <span class="pontos-pill" th:text="${r.pontosNecessarios + ' pts'}"></span>
                            </td>
                            <td>
                                <span th:if="${r.estoque != null}" th:text="${r.estoque}"></span>
                                <span th:if="${r.estoque == null}" class="text-muted">Ilimitado</span>
                            </td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${r.status.name() == 'ATIVO'} ? 'badge-ativo'
                                                    : (${r.status.name() == 'ESGOTADO'} ? 'badge-esgotado' : 'badge-inativo')"
                                      th:text="${r.status.name()}"></span>
                            </td>
                            <td class="pe-4">
                                <div class="d-flex gap-1">
                                    <!-- Editar -->
                                    <a th:href="@{/admin/recompensas/editar/{id}(id=${r.idRecompensa})}"
                                       class="btn btn-outline-secondary action-btn" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <!-- Inativar -->
                                    <form th:if="${r.status.name() == 'ATIVO'}"
                                          th:action="@{/admin/recompensas/status/{id}(id=${r.idRecompensa})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" name="novoStatus" value="INATIVO">
                                        <button class="btn action-btn"
                                                style="background:#F3F4F6;color:#374151"
                                                title="Inativar">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </form>
                                    <!-- Ativar -->
                                    <form th:if="${r.status.name() != 'ATIVO'}"
                                          th:action="@{/admin/recompensas/status/{id}(id=${r.idRecompensa})}"
                                          method="post" class="d-inline">
                                        <input type="hidden" name="novoStatus" value="ATIVO">
                                        <button class="btn action-btn"
                                                style="background:#D1FAE5;color:#065F46"
                                                title="Ativar">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
