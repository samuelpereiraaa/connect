<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${recompensa.idRecompensa == null} ? 'Nova Recompensa - Connect' : 'Editar Recompensa - Connect'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; --cg-h: #00965C; --cg-l: #E6F7F0; --cd: #111827; --cm: #6B7280; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: var(--cd); }
        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--cg) !important; font-size: 1.3rem; }
        .btn-connect { background: var(--cg); color: #fff; font-weight: 600; border: none; border-radius: 8px; padding: .55rem 1.5rem; }
        .btn-connect:hover { background: var(--cg-h); color: #fff; }
        .card { border: 1px solid #E5E7EB; border-radius: 12px; }
        .card-header { background: #fff; border-bottom: 1px solid #E5E7EB; border-radius: 12px 12px 0 0 !important; padding: 1.25rem 1.5rem; }
        .form-label { font-size: .87rem; font-weight: 600; }
        .form-control, .form-select, .form-control-plaintext { border-color: #D1D5DB; border-radius: 8px; font-size: .92rem; }
        .form-control:focus, .form-select:focus { border-color: var(--cg); box-shadow: 0 0 0 .2rem rgba(0,178,109,.15); }
        .section-label { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--cm); margin-bottom: .75rem; }
        .form-text { font-size: .8rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect Admin</span>
        <a href="/admin/recompensas" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>
</nav>

<div class="container py-4" style="max-width: 720px">

    <!-- Cabeçalho -->
    <div class="mb-4">
        <h4 class="fw-bold mb-0"
            th:text="${recompensa.idRecompensa == null} ? 'Nova Recompensa' : 'Editar Recompensa'"></h4>
        <p class="text-muted mb-0" style="font-size:.9rem">RF09 — Preencha os dados da recompensa</p>
    </div>

    <!-- Alerta de erro -->
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
    </div>

    <form th:action="${recompensa.idRecompensa == null}
                        ? @{/admin/recompensas/nova}
                        : @{/admin/recompensas/editar/{id}(id=${recompensa.idRecompensa})}"
          method="post">

        <div class="card mb-3">
            <div class="card-header">
                <span class="fw-semibold"><i class="bi bi-gift me-2"></i>Dados da Recompensa</span>
            </div>
            <div class="card-body p-4">

                <p class="section-label">Informações gerais</p>

                <!-- Nome -->
                <div class="mb-3">
                    <label class="form-label">Nome da recompensa <span class="text-danger">*</span></label>
                    <input type="text" name="nome" class="form-control"
                           th:value="${recompensa.nome}"
                           placeholder="Ex: Vale-desconto 10%, Muda de planta…"
                           maxlength="150" required>
                </div>

                <!-- Descrição -->
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea name="descricao" class="form-control" rows="3"
                              placeholder="Descreva os detalhes e benefícios da recompensa"
                              th:text="${recompensa.descricao}"></textarea>
                </div>

                <div class="row g-3">
                    <!-- Pontos necessários -->
                    <div class="col-md-4">
                        <label class="form-label">Pontos necessários <span class="text-danger">*</span></label>
                        <input type="number" name="pontosNecessarios" class="form-control"
                               th:value="${recompensa.pontosNecessarios}"
                               min="1" required>
                    </div>
                    <!-- Tipo -->
                    <div class="col-md-4">
                        <label class="form-label">Tipo</label>
                        <input type="text" name="tipo" class="form-control"
                               th:value="${recompensa.tipo}"
                               placeholder="Ex: Produto, Desconto…"
                               maxlength="100">
                    </div>
                    <!-- Estoque -->
                    <div class="col-md-4">
                        <label class="form-label">Estoque</label>
                        <input type="number" name="estoque" class="form-control"
                               th:value="${recompensa.estoque}"
                               min="0" placeholder="Vazio = ilimitado">
                        <div class="form-text text-muted">Deixe em branco para estoque ilimitado.</div>
                    </div>
                </div>

                <!-- Status – apenas na edição -->
                <div class="mt-3" th:if="${recompensa.idRecompensa != null}">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                        <option th:each="s : ${statusOpcoes}"
                                th:value="${s.name()}"
                                th:text="${s.name()}"
                                th:selected="${recompensa.status == s}"></option>
                    </select>
                </div>

            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-connect">
                <i class="bi bi-check-lg me-1"></i>Salvar Recompensa
            </button>
            <a href="/admin/recompensas" class="btn btn-outline-secondary">Cancelar</a>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
