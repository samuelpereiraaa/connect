<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Resgates - Connect Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; --cg-h: #00965C; --cg-l: #E6F7F0; --cd: #111827; --cm: #6B7280; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; color: var(--cd); }
        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 800; color: var(--cg) !important; font-size: 1.3rem; }
        .page-header { background: linear-gradient(135deg, #111827 0%, #1F2937 100%); color: #fff;
                       padding: 2rem 0 1.5rem; }
        .page-header h1 { font-weight: 800; font-size: 1.8rem; }
        .admin-badge { background: #F59E0B; color: #fff; font-size: .7rem; font-weight: 700;
                       border-radius: 6px; padding: .15rem .5rem; vertical-align: middle; }
        .card { border: 1px solid #E5E7EB; border-radius: 14px; }
        .card-header { background: #fff; border-bottom: 1px solid #E5E7EB;
                       border-radius: 14px 14px 0 0 !important; padding: 1rem 1.5rem; }
        .table thead th { font-size: .78rem; font-weight: 700; text-transform: uppercase;
                          letter-spacing: .04em; color: var(--cm); background: #F9FAFB;
                          border-bottom: 1px solid #E5E7EB; }
        .table tbody td { vertical-align: middle; font-size: .88rem; }
        .pontos-badge { background: var(--cg-l); color: var(--cg); font-weight: 700;
                        border-radius: 999px; padding: .2rem .7rem; font-size: .8rem; }
        .badge-SOLICITADO { background: #FEF3C7; color: #92400E; }
        .badge-APROVADO   { background: #D1FAE5; color: #065F46; }
        .badge-CANCELADO  { background: #F3F4F6; color: #374151; }
        .btn-aprovar  { font-size: .8rem; font-weight: 600; padding: .3rem .8rem;
                        border-radius: 8px; border: none; background: var(--cg); color: #fff; }
        .btn-aprovar:hover  { background: var(--cg-h); color: #fff; }
        .btn-cancelar { font-size: .8rem; font-weight: 600; padding: .3rem .8rem;
                        border-radius: 8px; border: 1px solid #E5E7EB; background: #fff; color: #374151; }
        .btn-cancelar:hover { background: #F3F4F6; }
        .filter-bar { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px;
                      padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-recycle me-2"></i>Connect</a>
        <div class="d-flex align-items-center gap-2">
            <span class="admin-badge"><i class="bi bi-shield-fill me-1"></i>ADMIN</span>
            <a href="/admin/recompensas" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-gift me-1"></i>Recompensas
            </a>
            <a href="/logout" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <div class="d-flex align-items-center gap-3 mb-2">
            <a href="/" class="text-white opacity-75 text-decoration-none" style="font-size:.9rem">
                <i class="bi bi-house me-1"></i>Início
            </a>
            <span class="text-white opacity-50">/</span>
            <span class="text-white" style="font-size:.9rem">Admin</span>
            <span class="text-white opacity-50">/</span>
            <span class="text-white" style="font-size:.9rem">Resgates</span>
        </div>
        <h1><i class="bi bi-bag-check-fill me-2"></i>Gerenciar Resgates
            <span class="admin-badge ms-2">RF10</span>
        </h1>
        <p class="mb-0 opacity-75">Aprove ou cancele solicitações de resgate de recompensas.</p>
    </div>
</div>

<div class="container py-4">

    <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill fs-5"></i>
        <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill fs-5"></i>
        <span th:text="${erro}"></span>
    </div>

    <!-- Filtro por status -->
    <div class="filter-bar">
        <form method="get" action="/admin/resgates" class="d-flex align-items-center gap-3 flex-wrap">
            <label class="fw-semibold mb-0" style="font-size:.9rem">Filtrar por status:</label>
            <select name="status" class="form-select form-select-sm" style="width:auto;">
                <option value="">Todos</option>
                <option th:each="s : ${statusOpcoes}"
                        th:value="${s.name()}"
                        th:text="${s.name()}"
                        th:selected="${filtrStatus == s.name()}"></option>
            </select>
            <button type="submit" class="btn btn-sm" style="background:var(--cg);color:#fff;border-radius:8px;font-weight:600;">
                <i class="bi bi-funnel me-1"></i>Filtrar
            </button>
            <a href="/admin/resgates" class="btn btn-sm btn-outline-secondary" style="border-radius:8px;">
                <i class="bi bi-x-lg me-1"></i>Limpar
            </a>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(resgates)}" class="text-center py-5 text-muted">
        <i class="bi bi-bag-x fs-1 d-block mb-3 opacity-25"></i>
        <p class="mb-0">Nenhum resgate encontrado.</p>
    </div>

    <div class="card" th:if="${not #lists.isEmpty(resgates)}">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">
                Resgates
                <span class="badge bg-light text-dark ms-1" th:text="${#lists.size(resgates)}"></span>
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Usuário</th>
                            <th>Recompensa</th>
                            <th>Pontos</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th class="pe-4 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rs : ${resgates}">
                            <td class="ps-4 text-muted fw-semibold" th:text="${rs.idResgate}"></td>
                            <td>
                                <div class="fw-semibold" th:text="${rs.usuario.nome}"></div>
                                <div class="text-muted" style="font-size:.78rem" th:text="${rs.usuario.email}"></div>
                            </td>
                            <td class="fw-semibold" th:text="${rs.recompensa.nome}"></td>
                            <td>
                                <span class="pontos-badge">
                                    <i class="bi bi-trophy-fill me-1"></i>
                                    <span th:text="${rs.pontosUtilizados}"></span> pts
                                </span>
                            </td>
                            <td class="text-muted"
                                th:text="${#temporals.format(rs.dataResgate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span class="badge rounded-pill fw-semibold px-3 py-2"
                                      th:classappend="'badge-' + ${rs.status.name()}"
                                      th:text="${rs.status.name()}"></span>
                            </td>
                            <td class="pe-4 text-center">
                                <!-- RF10 – Regra 3: aprovar desconta pontos via trigger do BD -->
                                <div class="d-flex gap-2 justify-content-center" th:if="${rs.status.name() == 'SOLICITADO'}">
                                    <form th:action="@{/admin/resgates/aprovar/{id}(id=${rs.idResgate})}" method="post"
                                          onsubmit="return confirm('Aprovar este resgate? Os pontos serão debitados automaticamente.')">
                                        <button type="submit" class="btn-aprovar">
                                            <i class="bi bi-check-lg me-1"></i>Aprovar
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/resgates/cancelar/{id}(id=${rs.idResgate})}" method="post"
                                          onsubmit="return confirm('Cancelar este resgate?')">
                                        <button type="submit" class="btn-cancelar">
                                            <i class="bi bi-x-lg me-1"></i>Cancelar
                                        </button>
                                    </form>
                                </div>
                                <span th:if="${rs.status.name() != 'SOLICITADO'}"
                                      class="text-muted" style="font-size:.8rem">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<footer class="border-top py-3 mt-4" style="background:#fff;">
    <div class="container text-center text-muted" style="font-size:.85rem">
        <i class="bi bi-recycle text-success me-1"></i> Connect © 2026 — Reciclagem com propósito.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
