<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - Connect</title>
	<link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect Admin</span>
        <a href="/logout" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-box-arrow-right me-1"></i>Sair
        </a>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-700 mb-0">Gerenciar Usuários</h4>
            <p class="text-muted mb-0" style="font-size:.9rem">Visualize, edite e controle o status dos usuários</p>
        </div>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 mb-3" role="alert">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${erro}"></span>
    </div>

    <!-- Filtros -->
    <div class="filter-card">
        <form method="get" action="/admin/usuarios">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-500" style="font-size:.85rem">Nome</label>
                    <input type="text" name="nome" class="form-control" placeholder="Buscar por nome"
                           th:value="${filtrNome}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-500" style="font-size:.85rem">E-mail</label>
                    <input type="text" name="email" class="form-control" placeholder="Buscar por e-mail"
                           th:value="${filtrEmail}">
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-500" style="font-size:.85rem">Tipo</label>
                    <select name="tipo" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"
                                th:selected="${filtrTipo == t}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-500" style="font-size:.85rem">Status</label>
                    <select name="status" class="form-select">
                        <option value="">Todos</option>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                                th:selected="${filtrStatus == s}"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-connect w-100">
                        <i class="bi bi-search me-1"></i>Filtrar
                    </button>
                    <a href="/admin/usuarios" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </div>
        </form>
    </div>

    <!-- Tabela -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-600">Usuários cadastrados
                <span class="badge bg-light text-dark ms-2" th:text="${#lists.size(usuarios)}"></span>
            </span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Tipo</th>
                            <th>Status</th>
                            <th>Cadastro</th>
                            <th class="pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(usuarios)}">
                            <td colspan="7" class="text-center text-muted py-4">Nenhum usuário encontrado.</td>
                        </tr>
                        <tr th:each="u : ${usuarios}">
                            <td class="ps-4 text-muted" th:text="${u.idUsuario}"></td>
                            <td class="fw-500" th:text="${u.nome}"></td>
                            <td th:text="${u.email}"></td>
                            <td>
                                <span class="badge badge-tipo rounded-pill" th:text="${u.tipo}"></span>
                            </td>
                            <td>
                                <span class="badge rounded-pill"
                                      th:classappend="${u.status.name() == 'ATIVO'} ? 'badge-ativo' : (${u.status.name() == 'INATIVO'} ? 'badge-inativo' : 'badge-suspenso')"
                                      th:text="${u.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(u.dataCadastro, 'dd/MM/yyyy')}"></td>
                            <td class="pe-4">
                                <div class="d-flex gap-1 flex-wrap">

                                    <!-- Editar dados -->
                                    <a th:href="@{/admin/usuarios/editar/{id}(id=${u.idUsuario})}"
                                       class="btn btn-outline-secondary action-btn">
                                        <i class="bi bi-pencil"></i>
                                    </a>

                                    <!-- Ver histórico -->
                                    <a th:href="@{/admin/usuarios/historico/{id}(id=${u.idUsuario})}"
                                       class="btn btn-outline-secondary action-btn" title="Histórico">
                                        <i class="bi bi-clock-history"></i>
                                    </a>

                                    <!-- Ativar -->
                                    <form th:if="${u.status.name() != 'ATIVO'}"
                                          th:action="@{/admin/usuarios/status/{id}(id=${u.idUsuario})}" method="post">
                                        <input type="hidden" name="novoStatus" value="ATIVO">
                                        <button type="submit" class="btn action-btn"
                                                style="background:#D1FAE5;color:#065F46" title="Ativar">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>

                                    <!-- Suspender -->
                                    <form th:if="${u.status.name() != 'SUSPENSO'}"
                                          th:action="@{/admin/usuarios/status/{id}(id=${u.idUsuario})}" method="post">
                                        <input type="hidden" name="novoStatus" value="SUSPENSO">
                                        <button type="submit" class="btn action-btn"
                                                style="background:#FEF3C7;color:#92400E" title="Suspender">
                                            <i class="bi bi-pause-circle"></i>
                                        </button>
                                    </form>

                                    <!-- Inativar -->
                                    <form th:if="${u.status.name() != 'INATIVO'}"
                                          th:action="@{/admin/usuarios/status/{id}(id=${u.idUsuario})}" method="post">
                                        <input type="hidden" name="novoStatus" value="INATIVO">
                                        <button type="submit" class="btn action-btn"
                                                style="background:#F3F4F6;color:#374151" title="Inativar">
                                            <i class="bi bi-x-lg"></i>
                                        </button>
                                    </form>

                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
