<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Usuário - Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --connect-green: #00B26D;
            --connect-green-hover: #00965C;
            --connect-green-light: #E6F7F0;
            --connect-dark: #111827;
            --connect-muted: #6B7280;
        }
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; color: var(--connect-dark); }
        .navbar { background-color: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--connect-green) !important; font-size: 1.3rem; }
        .card { border: 1px solid #E5E7EB; border-radius: 12px; }
        .card-header { background-color: #fff; border-bottom: 1px solid #E5E7EB; border-radius: 12px 12px 0 0 !important; padding: 1.25rem 1.5rem; }
        .form-label { font-size: 0.87rem; font-weight: 600; color: var(--connect-dark); }
        .form-control, .form-select { border-color: #D1D5DB; border-radius: 8px; font-size: 0.92rem; }
        .form-control:focus, .form-select:focus { border-color: var(--connect-green); box-shadow: 0 0 0 0.2rem rgba(0,178,109,.15); }
        .btn-connect { background-color: var(--connect-green); color: #fff; font-weight: 600; border: none; border-radius: 8px; padding: .55rem 1.5rem; }
        .btn-connect:hover { background-color: var(--connect-green-hover); color: #fff; }
        .form-text { font-size: 0.8rem; }
        .section-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--connect-muted); margin-bottom: .75rem; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect Admin</span>
        <a href="/admin/usuarios" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>
</nav>

<div class="container py-4" style="max-width: 680px">

    <div class="mb-4">
        <h4 class="fw-700 mb-0">Editar Usuário</h4>
        <p class="text-muted mb-0" style="font-size:.9rem">
            RF02 — Alteração de dados · ID <strong th:text="${usuario.idUsuario}"></strong>
        </p>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="fw-600" th:text="${usuario.nome}"></span>
            <span class="badge ms-2"
                  style="background:#E6F7F0;color:#00B26D;font-weight:600"
                  th:text="${usuario.tipo}"></span>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/admin/usuarios/editar/{id}(id=${usuario.idUsuario})}" method="post">

                <p class="section-label">Dados pessoais</p>

                <div class="mb-3">
                    <label class="form-label">Nome completo</label>
                    <input type="text" name="nome" class="form-control"
                           th:value="${usuario.nome}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control"
                           th:value="${usuario.email}" required>
                    <div class="form-text text-muted">O e-mail deve ser único no sistema (RS001).</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefone" class="form-control"
                           th:value="${usuario.telefone}" placeholder="(xx) xxxxx-xxxx">
                </div>

                <p class="section-label">Perfil de acesso</p>

                <div class="mb-4">
                    <label class="form-label">Tipo de usuário</label>
                    <select name="tipo" class="form-select" required>
                        <option th:each="t : ${tipos}"
                                th:value="${t}"
                                th:text="${t}"
                                th:selected="${usuario.tipo == t}"></option>
                    </select>
                    <div class="form-text text-muted">Define o perfil e permissões do usuário no sistema.</div>
                </div>

                <div class="d-flex gap-2 justify-content-end pt-2 border-top mt-2">
                    <a href="/admin/usuarios" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-connect">
                        <i class="bi bi-check-lg me-1"></i>Salvar alterações
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
