<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Reciclagem - Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; --cg-h: #00965C; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; }
        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--cg) !important; font-size: 1.3rem; }
        .btn-connect { background: var(--cg); color: #fff; font-weight: 600; border: none; border-radius: 8px; }
        .btn-connect:hover { background: var(--cg-h); color: #fff; }
        .card { border: 1px solid #E5E7EB; border-radius: 12px; }
        .card-header { background: #fff; border-bottom: 1px solid #E5E7EB; border-radius: 12px 12px 0 0 !important; padding: 1.25rem 1.5rem; }
        .form-control:focus, .form-select:focus { border-color: var(--cg); box-shadow: 0 0 0 .2rem rgba(0,178,109,.15); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect</span>
        <a href="/home" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
    </div>
</nav>

<div class="container py-4" style="max-width: 640px">

    <div class="mb-4">
        <h4 class="fw-bold mb-0">Registrar Reciclagem</h4>
        <p class="text-muted mb-0" style="font-size:.9rem">Informe os dados da sua reciclagem</p>
    </div>

    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i><span th:text="${erro}"></span>
    </div>

    <form action="/reciclagem/registrar" method="post">

        <div class="card mb-4">
            <div class="card-header"><span class="fw-semibold"><i class="bi bi-recycle me-2"></i>Dados da Reciclagem</span></div>
            <div class="card-body p-4">

                <!-- RF05 Regra 1: ponto vinculado -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Ponto de Coleta <span class="text-danger">*</span></label>
                    <select name="ponto.idPonto" class="form-select" required>
                        <option value="">Selecione o ponto</option>
                        <option th:each="p : ${pontos}"
                                th:value="${p.idPonto}"
                                th:text="${p.nome + (p.endereco != null ? ' — ' + p.endereco.municipio : '')}"></option>
                    </select>
                </div>

                <!-- RF05 Regra 1: catador vinculado -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Catador <span class="text-danger">*</span></label>
                    <select name="catador.idUsuario" class="form-select" required>
                        <option value="">Selecione o catador</option>
                        <option th:each="c : ${catadores}"
                                th:value="${c.idUsuario}"
                                th:text="${c.nome}"></option>
                    </select>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Tipo de Material <span class="text-danger">*</span></label>
                        <input type="text" name="tipoMaterial.nome" class="form-control"
                               placeholder="Ex: Plástico, Papel..." required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Quantidade (kg) <span class="text-danger">*</span></label>
                        <input type="number" name="quantidade" class="form-control"
                               placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                </div>

            </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
            <a href="/home" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-connect px-4">
                <i class="bi bi-check-lg me-1"></i>Registrar Reciclagem
            </button>
        </div>

    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
