<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Registros - Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; }
        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--cg) !important; }
        .badge-PENDENTE  { background: #FEF3C7; color: #92400E; }
        .badge-VALIDADO  { background: #D1FAE5; color: #065F46; }
        .badge-RECUSADO  { background: #FEE2E2; color: #991B1B; }
        .card { border: 1px solid #E5E7EB; border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect</span>
        <a href="/home" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Voltar</a>
    </div>
</nav>

<div class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0">Meus Registros de Reciclagem</h4>
            <p class="text-muted mb-0" style="font-size:.9rem">RF05 — Histórico de reciclagens</p>
        </div>
        <a href="/reciclagem/registrar" class="btn" style="background:#00B26D;color:#fff;border-radius:8px;font-weight:600">
            <i class="bi bi-plus-lg me-1"></i>Nova Reciclagem
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Ponto de Coleta</th>
                            <th>Material</th>
                            <th>Quantidade</th>
                            <th>QR Code</th>
                            <th>Data</th>
                            <th class="pe-4">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(registros)}">
                            <td colspan="7" class="text-center text-muted py-4">Nenhum registro encontrado.</td>
                        </tr>
                        <tr th:each="r : ${registros}">
                            <td class="ps-4 text-muted" th:text="${r.id}"></td>
                            <td th:text="${r.ponto != null ? r.ponto.nome : '—'}"></td>
                            <td th:text="${r.tipoMaterial != null ? r.tipoMaterial.nome : '—'}"></td>
                            <td th:text="${r.quantidade + ' kg'}"></td>
                            <td>
                                <span class="text-muted" style="font-size:.8rem;font-family:monospace"
                                      th:text="${r.qrCode != null ? r.qrCode.substring(0,8) + '...' : '—'}"></span>
                            </td>
                            <td th:text="${#temporals.format(r.dataRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="pe-4">
                                <span class="badge rounded-pill px-3 py-2"
                                      th:classappend="${'badge-' + r.status.name()}"
                                      th:text="${r.status.name()}"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
