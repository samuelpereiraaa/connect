<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Validações - Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --cg: #00B26D; }
        body { font-family: 'Inter', sans-serif; background: #F9FAFB; }

        .navbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 1rem 0; }
        .navbar-brand { font-weight: 700; color: var(--cg) !important; font-size: 1.1rem; }

        .card { border: 1px solid #E5E7EB; border-radius: 12px; }

        th { font-size: .8rem; font-weight: 600; color: #6B7280;
             text-transform: uppercase; letter-spacing: .04em; }
        td { vertical-align: middle; font-size: .9rem; }

        /* RF06 - Regra 2: badges de status */
        .badge-VALIDADO { background: #D1FAE5; color: #065F46; font-weight: 600; }
        .badge-RECUSADO { background: #FEE2E2; color: #991B1B; font-weight: 600; }

        .qr-mono { font-family: monospace; font-size: .78rem; color: #6B7280; }
        .obs-text { font-size: .82rem; color: #6B7280; font-style: italic; max-width: 220px;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-recycle me-2"></i>Connect</span>
        <div class="d-flex gap-2">
            <a href="/validacao/pendentes" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-hourglass-split me-1"></i>Pendentes
            </a>
            <a href="/home" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Voltar
            </a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- Cabeçalho -->
    <div class="mb-4">
        <h4 class="fw-bold mb-0">Histórico de Validações</h4>
        <!--
            RF06 - Regra 3: esta tela comprova que o sistema registra
            data e responsável pela validação.
        -->
        <p class="text-muted mb-0" style="font-size:.9rem">
            RF06 — Registros com data e responsável pela validação
            <span th:if="${usuario.tipo.name() == 'CATADOR'}">
                · validações realizadas por <strong th:text="${usuario.nome}"></strong>
            </span>
            <span th:if="${usuario.tipo.name() == 'ADMINISTRADOR'}">
                · visão completa (administrador)
            </span>
        </p>
    </div>

    <!-- Alertas -->
    <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${sucesso}"></span>
    </div>
    <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${erro}"></span>
    </div>

    <!-- Tabela de histórico -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Registro</th>
                            <th>Usuário</th>
                            <th>Material</th>
                            <th>Qtd.</th>
                            <!-- RF06 - Regra 2: status após validação -->
                            <th>Status</th>
                            <!-- RF06 - Regra 3: responsável pela validação -->
                            <th>Validado por</th>
                            <!-- RF06 - Regra 3: data da validação -->
                            <th>Data Validação</th>
                            <th class="pe-4">Observação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Estado vazio -->
                        <tr th:if="${#lists.isEmpty(historico)}">
                            <td colspan="8" class="text-center text-muted py-5">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                Nenhuma validação registrada ainda.
                            </td>
                        </tr>
                        <!-- Linhas do histórico -->
                        <tr th:each="r : ${historico}">
                            <td class="ps-4 fw-semibold text-muted" th:text="'#' + ${r.id}"></td>
                            <td th:text="${r.usuario != null ? r.usuario.nome : '—'}"></td>
                            <td th:text="${r.tipoMaterial != null ? r.tipoMaterial.nome : '—'}"></td>
                            <td th:text="${r.quantidade + ' kg'}"></td>

                            <!-- RF06 - Regra 2: status atualizado -->
                            <td>
                                <span class="badge rounded-pill px-3 py-2"
                                      th:classappend="${'badge-' + r.status.name()}"
                                      th:text="${r.status.name()}"></span>
                            </td>

                            <!-- RF06 - Regra 3: responsável -->
                            <td>
                                <span th:if="${r.catadorValidador != null}"
                                      th:text="${r.catadorValidador.nome}"></span>
                                <span th:if="${r.catadorValidador == null}" class="text-muted">—</span>
                            </td>

                            <!-- RF06 - Regra 3: data da validação -->
                            <td>
                                <span th:if="${r.dataValidacao != null}"
                                      th:text="${#temporals.format(r.dataValidacao, 'dd/MM/yyyy HH:mm')}"></span>
                                <span th:if="${r.dataValidacao == null}" class="text-muted">—</span>
                            </td>

                            <td class="pe-4">
                                <span th:if="${r.observacaoValidacao != null}"
                                      class="obs-text"
                                      th:text="${r.observacaoValidacao}"
                                      th:title="${r.observacaoValidacao}"></span>
                                <span th:if="${r.observacaoValidacao == null}" class="text-muted">—</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
