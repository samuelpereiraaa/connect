<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect - Crie sua conta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .card-register {
            max-width: 750px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
        }

        .brand-logo {
            background-color: #198754;
            color: white;
            padding: 8px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-success-custom {
            background-color: #15803d;
            border-color: #15803d;
            padding: 10px 30px;
            font-weight: 600;
        }

        .btn-success-custom:hover {
            background-color: #166534;
            border-color: #166534;
        }

        .form-check-inline-custom {
            border: 1px solid #dee2e6;
            padding: 12px 20px 12px 35px;
            border-radius: 8px;
            width: 100%;
            margin-right: 0;
            cursor: pointer;
        }

        .text-muted-custom {
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="container my-5">
    <div class="card card-register mx-auto p-4 p-md-5 bg-white shadow-sm">

        <div class="d-flex align-items-center mb-4">
            <div class="brand-logo me-2">
                <i class="bi bi-recycle fs-4"></i>
            </div>
            <span class="fw-bold fs-4 text-dark">Connect</span>
        </div>

        <h2 class="fw-bold text-dark mb-1">Crie sua conta</h2>
        <p class="text-muted-custom mb-4">
            Junte-se ao movimento de reciclagem e comece a ganhar pontos.
        </p>

        <form action="/registro" method="post">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nome completo</label>
                <input type="text" name="nome" class="form-control form-control-lg" required>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">CPF</label>
                    <input type="text" name="cpf" class="form-control form-control-lg" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Telefone</label>
                    <input type="text" name="telefone" class="form-control form-control-lg">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" name="senha" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold d-block">
                    Tipo de usuário
                </label>

                <div class="row g-3">

                    <div class="col-md-4">
                        <div class="form-check form-check-inline-custom">
                            <input class="form-check-input"
                                   type="radio"
                                   name="tipo"
                                   value="USUARIO"
                                   checked>

                            <label class="form-check-label fw-medium">
                                Usuário
                            </label>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="form-check form-check-inline-custom">
                            <input class="form-check-input"
                                   type="radio"
                                   name="tipo"
                                   value="CATADOR">

                            <label class="form-check-label fw-medium">
                                Catador
                            </label>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="form-check form-check-inline-custom">
                            <input class="form-check-input"
                                   type="radio"
                                   name="tipo"
                                   value="ADMINISTRADOR">

                            <label class="form-check-label fw-medium">
                                Administrador
                            </label>
                        </div>
                    </div>

                </div>
            </div>

            <hr class="my-4">

            <h5 class="fw-bold mb-3">Endereço</h5>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">CEP</label>
                    <input type="text" name="cep" class="form-control form-control-lg" required>
                </div>

                <div class="col-md-8">
                    <label class="form-label fw-semibold">Logradouro</label>
                    <input type="text" name="logradouro" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Número</label>
                    <input type="text" name="numero" class="form-control form-control-lg" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Bairro</label>
                    <input type="text" name="bairro" class="form-control form-control-lg" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Município</label>
                    <input type="text" name="municipio" class="form-control form-control-lg" required>
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-semibold">UF</label>
                    <input type="text" name="estado" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Complemento</label>
                <input type="text" name="complemento" class="form-control form-control-lg">
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" required>

                <label class="form-check-label">
                    Aceito os termos de uso e política de privacidade
                </label>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">

                <a href="/login"
                   class="text-secondary fw-semibold text-decoration-none">
                    Já tenho conta
                </a>

                <button type="submit"
                        class="btn btn-success btn-success-custom btn-lg rounded-3">
                    Criar conta
                </button>

            </div>

        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
