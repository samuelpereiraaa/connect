<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect - Crie sua conta</title>

    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ── Indicador de força da senha (RF03 Regra 3) ── */
        .strength-bar-wrap { height: 6px; border-radius: 4px; background: #E5E7EB; overflow: hidden; margin-top: 6px; }
        .strength-bar      { height: 100%; width: 0; border-radius: 4px; transition: width .3s, background .3s; }

        .strength-fraca    { background: #EF4444; }
        .strength-media    { background: #F59E0B; }
        .strength-boa      { background: #3B82F6; }
        .strength-forte    { background: #10B981; }

        .strength-label { font-size: .78rem; font-weight: 600; margin-top: 4px; }

        .req-list { list-style: none; padding: 0; margin: 8px 0 0; font-size: .8rem; color: #6B7280; }
        .req-list li { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
        .req-list li.ok  { color: #10B981; }
        .req-list li.ok  i::before { content: "\F26B"; } /* bi-check-circle-fill */
        .req-list li:not(.ok) i::before { content: "\F28E"; } /* bi-x-circle */
    </style>
</head>

<body>

<div class="container my-5">
    <div class="card card-register mx-auto p-4 p-md-5 bg-white shadow-sm">

        <div class="d-flex align-items-center mb-4">
            <div class="brand-logo me-2">
                <i class="bi bi-recycle fs-4"></i>
            </div>
            <span class="fw-bold fs-4 text-dark">Connect</span>
        </div>

        <h2 class="fw-bold text-dark mb-1">Crie sua conta</h2>
        <p class="text-muted-custom mb-4">
            Junte-se ao movimento de reciclagem e comece a ganhar pontos.
        </p>

        <!-- Mensagem de erro do backend -->
        <div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3"
             style="border-radius:8px;font-size:.9rem">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${erro}"></span>
        </div>

        <form action="/registro" method="post" id="formCadastro">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nome completo</label>
                <input type="text" name="nome" class="form-control form-control-lg" required>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">CPF</label>
                    <input type="text" name="cpf" class="form-control form-control-lg"
                           maxlength="11" placeholder="Somente números" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Telefone</label>
                    <input type="text" name="telefone" class="form-control form-control-lg">
                </div>

                <!-- RF03 Regra 3 – Campo senha com indicador de força -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" id="senhaInput" name="senha"
                           class="form-control form-control-lg" required
                           minlength="8" autocomplete="new-password">

                    <!-- Barra de força -->
                    <div class="strength-bar-wrap">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel" style="color:#9CA3AF;">
                        Digite uma senha
                    </div>

                    <!-- Lista de requisitos -->
                    <ul class="req-list" id="reqList">
                        <li id="req-len"><i class="bi"></i> Mínimo 8 caracteres</li>
                        <li id="req-upper"><i class="bi"></i> Uma letra maiúscula</li>
                        <li id="req-lower"><i class="bi"></i> Uma letra minúscula</li>
                        <li id="req-num"><i class="bi"></i> Um número</li>
                        <li id="req-special"><i class="bi"></i> Um caractere especial (!@#$%...)</li>
                    </ul>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold d-block">Tipo de usuário</label>
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="form-check form-check-inline-custom">
                            <input class="form-check-input" type="radio" name="tipo" value="USUARIO" checked>
                            <label class="form-check-label fw-medium">Usuário</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check form-check-inline-custom">
                            <input class="form-check-input" type="radio" name="tipo" value="CATADOR">
                            <label class="form-check-label fw-medium">Catador</label>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="my-4">
            <h5 class="fw-bold mb-3">Endereço</h5>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">CEP</label>
                    <input type="text" name="cep" class="form-control form-control-lg"
                           maxlength="8" placeholder="Somente números" required>
                </div>
                <div class="col-md-8">
                    <label class="form-label fw-semibold">Logradouro</label>
                    <input type="text" name="logradouro" class="form-control form-control-lg" required>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Número</label>
                    <input type="text" name="numero" class="form-control form-control-lg" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Bairro</label>
                    <input type="text" name="bairro" class="form-control form-control-lg" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Município</label>
                    <input type="text" name="municipio" class="form-control form-control-lg" required>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold">UF</label>
                    <input type="text" name="estado" class="form-control form-control-lg"
                           maxlength="2" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Complemento</label>
                <input type="text" name="complemento" class="form-control form-control-lg">
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="termos" required>
                <label class="form-check-label" for="termos">
                    Aceito os termos de uso e política de privacidade
                </label>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4">
                <a href="/login" class="text-secondary fw-semibold text-decoration-none">
                    Já tenho conta
                </a>
                <button type="submit" id="btnCriar"
                        class="btn btn-success btn-success-custom btn-lg rounded-3" disabled>
                    Criar conta
                </button>
            </div>

        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- RF03 Regra 3 – Validação de força de senha no frontend -->
<script>
    const senhaInput  = document.getElementById('senhaInput');
    const bar         = document.getElementById('strengthBar');
    const label       = document.getElementById('strengthLabel');
    const btnCriar    = document.getElementById('btnCriar');

    const reqLen     = document.getElementById('req-len');
    const reqUpper   = document.getElementById('req-upper');
    const reqLower   = document.getElementById('req-lower');
    const reqNum     = document.getElementById('req-num');
    const reqSpecial = document.getElementById('req-special');

    function marcar(el, ok) {
        el.classList.toggle('ok', ok);
    }

    senhaInput.addEventListener('input', function () {
        const s = this.value;

        const okLen     = s.length >= 8;
        const okUpper   = /[A-Z]/.test(s);
        const okLower   = /[a-z]/.test(s);
        const okNum     = /[0-9]/.test(s);
        const okSpecial = /[!@#$%^&*()\-_=+\[\]{};:'",.<>/?\\|`~]/.test(s);

        marcar(reqLen,     okLen);
        marcar(reqUpper,   okUpper);
        marcar(reqLower,   okLower);
        marcar(reqNum,     okNum);
        marcar(reqSpecial, okSpecial);

        const pontos = [okLen, okUpper, okLower, okNum, okSpecial].filter(Boolean).length;
        const todos  = pontos === 5;

        bar.className = 'strength-bar';

        if (s.length === 0) {
            bar.style.width = '0';
            label.textContent = 'Digite uma senha';
            label.style.color = '#9CA3AF';
        } else if (pontos <= 2) {
            bar.style.width = '25%';
            bar.classList.add('strength-fraca');
            label.textContent = 'Senha fraca';
            label.style.color = '#EF4444';
        } else if (pontos === 3) {
            bar.style.width = '50%';
            bar.classList.add('strength-media');
            label.textContent = 'Senha média';
            label.style.color = '#F59E0B';
        } else if (pontos === 4) {
            bar.style.width = '75%';
            bar.classList.add('strength-boa');
            label.textContent = 'Senha boa';
            label.style.color = '#3B82F6';
        } else {
            bar.style.width = '100%';
            bar.classList.add('strength-forte');
            label.textContent = 'Senha forte ✓';
            label.style.color = '#10B981';
        }

        // Botão habilitado apenas quando todos os critérios forem atendidos
        btnCriar.disabled = !todos;
    });
</script>
</body>
</html>
